llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 1200
  api_key_env: OPENAI_API_KEY
  # base_url: https://your-proxy/v1
  # extra:
  #   timeout: 60

data:
  # 服务器上原始研报 PDF/TXT/MD 目录（可为空）
  report_raw_dir: /data/quant/reports/raw
  # 服务器上研报摘要目录（优先读取；可为空）
  report_summary_dir: /data/quant/reports/summary
  # 服务器上行业事件文件路径
  events_file: /data/quant/events/events.csv
  # 服务器上行业行情目录（每个行业一个 CSV，文件名=行业名.csv）
  market_dir: /data/quant/market

trading:
  industries: [新能源, 半导体, 银行, 医药]
  start_date: "2025-01-01"
  end_date: "2025-12-31"
  lookback_days: 20
  initial_cash: 1000000
  max_position: 0.35
  transaction_cost_bps: 10
  rebalance_frequency: D

output:
  output_dir: ./outputs/run_01
  save_daily_positions: true
