llm:
  provider: rule_based
  model: offline

data:
  report_raw_dir: /data/quant/reports/raw
  report_summary_dir: /data/quant/reports/summary
  events_file: /data/quant/events/events.csv
  market_dir: /data/quant/market

trading:
  industries: [新能源, 半导体, 银行, 医药]
  start_date: "2025-08-01"
  end_date: "2025-08-08"
  lookback_days: 20
  initial_cash: 1000000
  max_position: 0.35
  transaction_cost_bps: 10
  rebalance_frequency: D

output:
  output_dir: ./outputs/rule_based_demo
  save_daily_positions: true
