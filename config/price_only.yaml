llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 1200
  api_key_env: OPENAI_API_KEY
  base_url: https://api2.aigcbest.top/v1

data:
  report_raw_dir: /data/Graph_reasoning_Agent/Generate/hangye_yanbao/report_pdfs
  report_summary_dir: /data/Graph_reasoning_Agent/Generate/hangye_yanbao/report_texts
  events_file: /data/Graph_reasoning_Agent/Generate/significant_impact_events.csv
  market_dir: /data/Graph_reasoning_Agent/Generate/hangye_yanbao/bk_kline_by_industry
  industry_match_file: /data/Graph_reasoning_Agent/Generate/industry_match_test_report.csv
  market_index_file: /data/Graph_reasoning_Agent/Generate/market_index_kline/沪深300__000300.csv

trading:
  # 纯行情模式建议手动给行业列表
  industries: ["互联网服务","通用设备","电池","汽车零部件","商业百货","半导体"]
  auto_select_industries: false
  auto_select_top_n: 8
  min_event_count: 2
  use_reports: false
  use_events: false
  start_date: "2025-12-01"
  end_date: "2025-12-31"
  lookback_days: 20
  initial_cash: 1000000
  max_position: 0.35
  transaction_cost_bps: 10
  rebalance_frequency: D

output:
  output_dir: ./outputs/price_only_run
  save_daily_positions: true
